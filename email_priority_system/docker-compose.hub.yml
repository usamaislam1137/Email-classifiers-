# Run pre-built images from Docker Hub (no local build).
#
# Set DOCKERHUB_USER to the same Docker Hub username you used when pushing
# (bin/push-dockerhub.sh can read it from `docker login` when you push).
#
#   export DOCKERHUB_USER=your_dockerhub_username
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up
#
# Repositories must be Public on Docker Hub for anonymous pull (no docker login).
#
# ML API on host defaults to port 5001 (see docker-compose.yml). Override:
#   ML_API_HOST_PORT=5000 docker compose -f docker-compose.hub.yml up

services:
  ml-api:
    image: ${DOCKERHUB_USER:?Set DOCKERHUB_USER to your Docker Hub username}/email-priority-ml-api:latest
    container_name: email_ml_api
    ports:
      - "${ML_API_HOST_PORT:-5001}:5000"
    volumes:
      - ./ml/data:/app/data
      - ./ml/models:/app/models
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  rails-app:
    image: ${DOCKERHUB_USER:?Set DOCKERHUB_USER to your Docker Hub username}/email-priority-rails-app:latest
    container_name: email_rails_app
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=production
      - ML_API_URL=http://ml-api:5000
      - ML_API_TIMEOUT=30
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-change_me_in_production_please_use_a_real_secret}
      - RAILS_LOG_TO_STDOUT=true
    volumes:
      - rails_db:/rails/db
      - rails_storage:/rails/storage
    depends_on:
      ml-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rails_db:
  rails_storage:
